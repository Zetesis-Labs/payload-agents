name: Publish Python Package

on:
  workflow_call:
    inputs:
      package:
        description: "Workspace package to publish"
        required: true
        type: string
      ref:
        description: "Git ref (tag or sha) to checkout and build from"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      package:
        description: "Workspace package to publish"
        required: true
        default: "agno-agent-builder"
        type: choice
        options:
          - agno-agent-builder
      ref:
        description: "Git ref (tag or sha) to publish (defaults to current branch)"
        required: false
        type: string

jobs:
  publish:
    name: Build & publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ inputs.package }}
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build distribution
        run: uv build --package "${{ inputs.package }}"

      - name: Publish to PyPI (trusted publisher / OIDC)
        run: uv publish
